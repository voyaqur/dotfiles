# ~/.config/yazi/theme.toml

[manager]
# Use thin lines for columns instead of heavy blocks
border_symbol = "│"
border_style  = { fg = "#45475a" } # Set to a muted gray/hex matching your system theme

[status]
# Clean up the bottom status bar colors
background = "#1e1e2e"
normal     = { fg = "#cdd6f4", bg = "#1e1e2e" }

