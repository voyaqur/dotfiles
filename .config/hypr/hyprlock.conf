# ==========================================================
# RE-ENGINEERED HYPRLOCK CONFIGURATION
# ==========================================================

animations {
    enabled = true
    bezier = smoothOut, 0.16, 1, 0.3, 1
    bezier = fluentBezier, 0.1, 0.9, 0.1, 1.0
    animation = windows, 1, 3.5, smoothOut, popin 95%
    animation = workspaces, 1, 4, smoothOut, slide
    animation = fade, 1, 4.5, smoothOut
    animation = layers, 1, 4, fluentBezier, fade
}

background {
    monitor =
    path = ~/dotfiles/wallpaper/wallhaven-gj5j1e.jpg
    color = rgba(25, 20, 20, 1.0)

    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.75
    vibrancy = 0.1696
}

# ==========================================================
# TOP CENTER: TIME & DATE HEADER
# ==========================================================

# Big Digital Clock
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.95)
    font_size = 64
    font_family = FiraCode Nerd Font Bold
    position = 0, -60
    halign = center
    valign = top
}

# Date Label
label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B"
    color = rgba(255, 255, 255, 0.6)
    font_size = 15
    font_family = FiraCode Nerd Font
    position = 0, -150
    halign = center
    valign = top
}

# ==========================================================
# GEOMETRIC CENTER: 3D SPINNING DONUT
# ==========================================================

# Native C++ 3D Donut Mesh

# Busy State Status String
label {
    monitor =
    text = I'm busy gang...
    color = rgba(255, 255, 255, 0.4)
    font_size = 20
    font_family = FiraCode Nerd Font Bold
    position = 0, 0
    halign = center
    valign = center
}

# ==========================================================
# BOTTOM CENTER: GREETING & PASS-BOX
# ==========================================================

# User Greeting
label {
    monitor =
    text = Hi, $USER
    color = rgba(255, 255, 255, 0.4)
    font_size = 12
    font_family = FiraCode Nerd Font
    position = 0, 110
    halign = center
    valign = bottom
}

# Frosted Capsule Input Field
input-field {
    monitor =
    size = 260, 42
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.35
    dots_center = true
    rounding = -1 

    outer_color = rgba(255, 255, 255, 0.12)
    inner_color = rgba(255, 255, 255, 0.06)
    font_color = rgba(255, 255, 255, 0.8)
    
    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff" alpha="35%">Enter Password...</span>
    hide_input = false
    
    check_color = rgba(255, 255, 255, 0.3)
    fail_color = rgba(243, 139, 168, 0.4)
    fail_transition = 150
    
    position = 0, 50
    halign = center
    valign = bottom
}

# ==========================================================
# EDGE ACCENTS (TIGHT CORNER SYSTEM TRACKERS)
# ==========================================================

# Top Left Edge: System Uptime
label {
    monitor =
    text = cmd[update:60000] echo "󱎫 up $(uptime -p | sed 's/up //')"
    color = rgba(255, 255, 255, 0.5)
    font_size = 10
    font_family = FiraCode Nerd Font
    position = 15, -15
    halign = left
    valign = top
}

# Top Left Edge (Shifted Down): Kernel Info
label {
    monitor =
    text = cmd[update:43200000] echo "󰣇 $(uname -r) ($(uname -n)@$(whoami))"
    color = rgba(255, 255, 255, 0.3)
    font_size = 9
    font_family = FiraCode Nerd Font 
    position = 15, -35
    halign = left
    valign = top
}

# Top Right Edge: Battery Status
label {
    monitor =
    text = cmd[update:5000] echo "$(cat /sys/class/power_supply/BAT0/status | grep -q 'Charging' && echo '󱐋 ')󰁹 $(cat /sys/class/power_supply/BAT0/capacity)%"
    color = rgba(255, 255, 255, 0.5)
    font_size = 10
    font_family = FiraCode Nerd Font
    position = -15, -15
    halign = right
    valign = top
}

# Top Right Edge (Shifted Down): Active Keyboard Layout
label {
    monitor =
    text = cmd[update:1000] hyprctl devices -j | jq -r '.keyboards[] | select(.main == true) | .active_keymap' | cut -c1-2 | tr '[:lower:]' '[:upper:]'
    color = rgba(255, 255, 255, 0.35)
    font_size = 9
    font_family = FiraCode Nerd Font Bold
    position = -15, -35
    halign = right
    valign = top
}
